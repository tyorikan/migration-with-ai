apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-modern-go-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-modern-go
  template:
    metadata:
      labels:
        app: app-modern-go
    spec:
      containers:
      - name: app-modern-go
        # artifact registry に push したイメージパスに書き換えてください
        # 例: asia-northeast1-docker.pkg.dev/your-project/migration-workshop-repo/app-modern-go:v1.0.0
        image: REPLACE_WITH_YOUR_IMAGE_URI
        ports:
        - containerPort: 8080
        resources:
          # GKE Autopilot では CPU と memory の requests 指定が必須です
          requests:
            cpu: "250m"
            memory: "512Mi"
          # GKE Autopilot では limits=requests として扱われます
          limits:
            cpu: "250m"
            memory: "512Mi"
        env:
        # DB接続用のダミー環境変数（実際は Kubernetes Secret や Workload Identity で連携します）
        - name: DB_CONNECTION_STRING
          value: "postgres://k8s-service-user:supersecret@10.0.0.9:5432/migration_db"
