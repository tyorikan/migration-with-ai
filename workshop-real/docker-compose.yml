services:
  # -------------------------------------------------------
  # 🐘 PostgreSQL — 移行先 DB
  # -------------------------------------------------------
  db:
    image: postgres:16
    container_name: sfdc-migration-db
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: migration_db
    ports:
      - "5432:5432"
    volumes:
      # ワークショップのディレクトリをマウント（SQL / CSV / スクリプトを直接実行可能に）
      # SFDC エクスポート CSV（./data/）も含めて /workspace 配下で参照可能
      - .:/workspace:ro
      # データ永続化
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d migration_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -------------------------------------------------------
  # 🐍 FastAPI App — 移行後アプリケーション
  # -------------------------------------------------------
  # Step 3 でコード生成後に有効化
  app:
    build:
      context: ./03-code-modernization/output
      dockerfile: Dockerfile
    container_name: sfdc-migration-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: app_user
      DB_PASSWORD: password
      DB_NAME: migration_db
    depends_on:
      db:
        condition: service_healthy
    # ソースコードをマウント（開発時のホットリロード用）
    volumes:
      - ./03-code-modernization/output:/app:ro

  # -------------------------------------------------------
  # 🎨 A2UI Lit Renderer — フロントエンド（Step 4 で有効化）
  # -------------------------------------------------------
  # Step 4 の /generate-a2ui-frontend 実行後に有効化
  a2ui-renderer:
    build:
      context: ./04-frontend-a2ui/output/renderer
      dockerfile: Dockerfile
    container_name: sfdc-migration-a2ui
    ports:
      - "5173:5173"
    environment:
      # Agent の接続先（app コンテナ内の ADK エンドポイント）
      AGENT_URL: http://app:8080
    depends_on:
      - app
    profiles:
      - frontend  # docker compose --profile frontend up で有効化

volumes:
  pgdata:
